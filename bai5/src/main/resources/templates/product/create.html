<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{product/layout}">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1e40af;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        .content-section {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }
        
        .content-section h2 {
            color: var(--gray-800);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .content-section h2 i {
            color: var(--primary);
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }
        
        .form-group label i {
            color: var(--primary);
            width: 16px;
        }
        
        .form-control {
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 14px;
            color: var(--gray-800);
            transition: all 0.2s ease;
        }
        
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }
        
        .form-control::placeholder {
            color: var(--gray-600);
        }
        
        .text-danger {
            font-size: 12px;
            color: #ef4444;
            margin-top: 6px;
            display: block;
        }
        
        .btn-group-action {
            display: flex;
            gap: 12px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--gray-200);
        }
        
        .btn {
            border-radius: 6px;
            font-weight: 600;
            padding: 10px 20px;
            font-size: 14px;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary, .btn-success {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover, .btn-success:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        .btn-secondary {
            background: var(--gray-200);
            color: var(--gray-700);
        }
        
        .btn-secondary:hover {
            background: var(--gray-300);
        }
        
        small.text-muted {
            color: var(--gray-600);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="content-section">
            <h2><i class="fas fa-plus-circle"></i> Add New Product</h2>
            
            <form th:action="@{/products/create}" method="post" th:object="${product}" enctype="multipart/form-data">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="name"><i class="fas fa-tag"></i> Product Name</label>
                            <input class="form-control" type="text" id="name" 
                                   th:field="*{name}" placeholder="Enter product name" required>
                            <span th:if="${#fields.hasErrors('name')}" class="text-danger" th:errors="*{name}">
                                <i class="fas fa-exclamation-circle"></i> Name Error
                            </span>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="price"><i class="fas fa-dollar-sign"></i> Price</label>
                            <input class="form-control" type="number" id="price" 
                                   th:field="*{price}" placeholder="Enter price" required>
                            <span th:if="${#fields.hasErrors('price')}" class="text-danger" th:errors="*{price}">
                                <i class="fas fa-exclamation-circle"></i> Price Error
                            </span>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="category"><i class="fas fa-th"></i> Category</label>
                            <select name="categoryId" class="form-control" id="category" required>
                                <option value="">-- Select Category --</option>
                                <option th:each="category : ${categories}" 
                                        th:value="${category.id}" th:text="${category.name}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="image"><i class="fas fa-image"></i> Product Image</label>
                            <input class="form-control" type="file" id="image" name="imageProduct" accept="image/*">
                            <small class="text-muted d-block mt-2">Allowed formats: JPG, PNG, GIF (Max 5MB)</small>
                        </div>
                    </div>
                </div>

                <div class="btn-group-action">
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save"></i> Add Product
                    </button>
                    <a href="/products" th:href="@{/products}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
