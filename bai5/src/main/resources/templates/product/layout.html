<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Demo Products - Phát triển ứng dụng với J2EE">
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">Demo Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1e40af;
            --accent: #ec4899;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
        }
        
        body {
            display: flex;
            flex-direction: column;
            background: #f5f6f7;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            color: var(--gray-800);
            line-height: 1.6;
        }
        
        /* Navigation */
        nav.navbar {
            background: white !important;
            box-shadow: var(--shadow-sm);
            border-bottom: 1px solid var(--gray-200);
        }
        
        nav.navbar .navbar-brand {
            font-weight: 800;
            font-size: 20px;
            color: var(--primary) !important;
            letter-spacing: -0.5px;
        }
        
        nav a {
            color: var(--gray-600) !important;
            margin: 0 8px;
            padding: 8px 12px !important;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-weight: 500;
            font-size: 14px;
        }
        
        nav a:hover {
            background-color: var(--gray-100) !important;
            color: var(--primary) !important;
            transform: translateY(-1px);
        }
        
        /* Main Container */
        .main-container {
            display: flex;
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 24px auto;
            gap: 24px;
            padding: 0 20px;
        }
        
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: white;
            padding: 24px;
            border-radius: 10px;
            box-shadow: var(--shadow-sm);
            height: fit-content;
            border: 1px solid var(--gray-200);
        }
        
        .sidebar h3 {
            color: var(--gray-800);
            font-weight: 700;
            margin-bottom: 16px;
            font-size: 16px;
            letter-spacing: -0.3px;
        }
        
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        
        .sidebar li {
            margin-bottom: 12px;
        }
        
        .sidebar a {
            color: white;
            padding: 10px 14px;
            display: block;
            border-radius: 6px;
            background: var(--primary);
            text-decoration: none;
            text-align: center;
            font-weight: 500;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        
        .sidebar a:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }
        
        /* Content Area */
        .content {
            flex: 1;
            background: white;
            padding: 32px;
            border-radius: 10px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-200);
            min-height: 500px;
        }
        
        .content h1, .content h2 {
            color: var(--gray-800);
            margin-bottom: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .content h2 {
            font-size: 26px;
        }
        
        /* Form */
        .form-control {
            border: 1px solid var(--gray-300);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 14px;
            transition: all 0.2s ease;
            background: white;
        }
        
        .form-control:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 6px;
            display: block;
            font-size: 14px;
        }
        
        /* Buttons */
        .btn {
            padding: 10px 20px;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            transition: all 0.2s ease;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
            color: white;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-success:hover {
            background: #059669;
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
            color: white;
        }
        
        .btn-warning {
            background: #f59e0b;
            color: white;
        }
        
        .btn-warning:hover {
            background: #d97706;
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
            color: white;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
            color: white;
        }
        
        /* Table */
        .table {
            margin-top: 20px;
            border-collapse: collapse;
            width: 100%;
        }
        
        .table thead {
            background: var(--gray-50);
            border-bottom: 2px solid var(--gray-200);
        }
        
        .table th {
            border: none;
            padding: 12px 14px;
            font-weight: 700;
            color: var(--gray-700);
            text-align: left;
            font-size: 13px;
            letter-spacing: 0.3px;
        }
        
        .table td {
            padding: 14px;
            border-bottom: 1px solid var(--gray-200);
            vertical-align: middle;
            font-size: 14px;
        }
        
        .table tbody tr:hover {
            background-color: var(--gray-50);
        }
        
        .table img {
            border-radius: 6px;
            border: 1px solid var(--gray-200);
        }
        
        /* Footer */
        footer {
            background: var(--gray-50);
            color: var(--gray-600);
            text-align: center;
            padding: 20px;
            margin-top: auto;
            border-top: 1px solid var(--gray-200);
            font-size: 13px;
        }
        
        footer p {
            margin: 0;
        }
        
        /* Alerts */
        .alert {
            border-radius: 6px;
            border: none;
        }
        
        .alert-warning {
            background-color: #fef3c7;
            color: #78350f;
            border-left: 4px solid #f59e0b;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                margin: 16px auto;
            }
            
            .sidebar {
                width: 100%;
            }
            
            .content {
                padding: 20px;
            }
            
            nav a {
                margin: 0 4px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark border-bottom">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class="fas fa-shopping-bag"></i> Demo Products
            </span>
            <div>
                <a href="/" th:href="@{/}" title="Trang chủ">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="/products" th:href="@{/products}" title="Danh sách sản phẩm">
                    <i class="fas fa-list"></i> Products
                </a>
            </div>
        </div>
    </nav>
    
    <div class="main-container">
        <aside class="sidebar">
            <h3><i class="fas fa-search"></i> Search</h3>
            <form class="d-flex flex-column" role="search" th:action="@{/home/search}" th:method="get">
                <input class="form-control mb-3" type="search" placeholder="Search products..." aria-label="Search" name="search">
                <button class="btn btn-primary w-100" type="submit">
                    <i class="fas fa-search"></i> Search
                </button>
            </form>
        </aside>
        
        <div class="content" layout:fragment="content">
            <!-- Nội dung các trang con sẽ được chèn vào đây -->
        </div>
    </div>
    
    <footer>
        <hr style="border-color: #555; margin: 10px 0;">
        <p><i class="fas fa-copyright"></i> 2025 - Phát triển ứng dụng với J2EE</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
